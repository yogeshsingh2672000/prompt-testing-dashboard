name: Bug report
description: Report a bug in Promitly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps so another contributor can reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, local setup, and any relevant model or prompt settings.
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Screenshots, logs, clips, or related issues.
